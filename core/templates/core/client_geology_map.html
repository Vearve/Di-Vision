{% extends 'core/base.html' %}
{% block title %}Geology Map – 2D Drill Collar Plot (Client View){% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  #map { height: 600px; border-radius: 4px; }
  .map-controls { position: absolute; top: 10px; left: 10px; z-index: 1000; }
  .map-controls button { background: white; border: 1px solid #ccc; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-bottom: 5px; }
</style>
{% endblock %}
{% block content %}
<div class="container-fluid">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h4 class="mb-0"><i class="bi bi-map me-2"></i>Geology – 2D Map</h4>
      <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="{% url 'core:home_dashboard' %}">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'core:client_drill_hole_list' %}">Drill Holes</a></li>
        <li class="breadcrumb-item active">2D Map</li>
      </ol></nav>
    </div>
    <div class="d-flex gap-2">
      <a href="{% url 'core:client_geology_map_export' %}" class="btn btn-outline-success btn-sm">
        <i class="bi bi-download me-1"></i>Export GeoJSON
      </a>
      <a href="{% url 'core:client_drill_hole_list' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-list me-1"></i>List View
      </a>
      <a href="{% url 'core:client_drill_hole_paths_3d' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-diagram-3 me-1"></i>3D Compare
      </a>
      <a href="{% url 'core:client_cross_section' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-layout-split me-1"></i>Cross Section
      </a>
    </div>
  </div>

  <!-- Map -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div id="map"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  // Initialize map
  const map = L.map('map').setView([-25.2744, 134.7751], 4); // Australia default
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);

  // Load collar data
  fetch('{% url "core:client_geology_map_data" %}').then(r => r.json()).then(geojson => {
    const layer = L.geoJSON(geojson, {
      pointToLayer(feature, latlng) {
        return L.circleMarker(latlng, {
          radius: 8,
          fillColor: '#3388ff',
          color: '#fff',
          weight: 2,
          opacity: 1,
          fillOpacity: 0.8,
        });
      },
      onEachFeature(feature, layer) {
        const props = feature.properties;
        const popupContent = `
          <div style="font-size: 12px;">
            <strong>${props.hole_id}</strong><br />
            Collar Elev: ${props.collar_elevation || '—'} m<br />
            Total Depth: ${props.total_depth || '—'} m<br />
            Dip: ${props.dip || '—'}°, Azimuth: ${props.azimuth || '—'}°<br />
            <a href="${props.url}" style="color: #3388ff;">View Strip Log →</a>
          </div>
        `;
        layer.bindPopup(popupContent);
      },
    }).addTo(map);

    // Auto-fit map to bounds
    if (geojson.features.length > 0) {
      map.fitBounds(layer.getBounds().pad(0.1));
    }
  });
</script>
{% endblock %}
